name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    name: Lint & static analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gmp, bcmath, openssl, mbstring, dom, curl, json
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Lint (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        testbench: ['9.*', '10.*', '11.*']
        stability: [prefer-stable]
        include:
          - php: '8.4'
            testbench: '11.*'
            stability: prefer-lowest

    name: PHP ${{ matrix.php }} - Testbench ${{ matrix.testbench }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gmp, bcmath, openssl, mbstring, dom, curl, json
          coverage: none

      # Compat matrix: don't block dependency resolution on framework security
      # advisories — we are testing version compatibility, not shipping the app.
      - name: Allow advisory-affected framework versions
        run: composer config policy.advisories.block false

      - name: Constrain testbench
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Tests (Pest)
        run: vendor/bin/pest
